version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: quiz_postgres
    environment:
      POSTGRES_DB: quizdb
      POSTGRES_USER: quizuser
      POSTGRES_PASSWORD: quizpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: quiz_redis
    ports:
      - "6379:6379"

  questions:
    build: ./services/questions
    ports:
      - "5001:80"
    depends_on:
      - postgres
      - redis

  tests:
    build: ./services/tests
    ports:
      - "5002:80"
    depends_on:
      - postgres
      - redis

  answers:
    build: ./services/answers
    ports:
      - "5003:80"
    depends_on:
      - postgres
      - redis

  results:
    build: ./services/results
    ports:
      - "5004:80"
    depends_on:
      - postgres

  analytics:
    build: ./services/analytics
    ports:
      - "5005:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
